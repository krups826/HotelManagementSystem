<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reviews | Grand Heaven</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav>
    <a href="dashboard.html" style="text-decoration: none;">
        <h1>GRAND HEAVEN</h1>
    </a>

    <div class="nav-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="login.html">Logout</a>
    </div>
</nav>

<div class="container" style="max-width:700px;">

    <h2 style="text-align:center; margin-bottom:10px;">
        Share Your Experience
    </h2>

    <p style="
        text-align:center;
        color:var(--text-muted);
        margin-bottom:30px;">
        Your feedback helps us improve our hospitality.
    </p>

    <form id="reviewForm">

        <label>Customer ID</label>
        <input
                type="number"
                id="customerId"
                required>

        <label>Rating</label>

        <select id="rating" required>
            <option value="">Select Rating</option>
            <option value="5">⭐⭐⭐⭐⭐ Excellent</option>
            <option value="4">⭐⭐⭐⭐ Very Good</option>
            <option value="3">⭐⭐⭐ Good</option>
            <option value="2">⭐⭐ Fair</option>
            <option value="1">⭐ Poor</option>
        </select>

        <label>Your Review</label>

        <textarea
                id="comment"
                rows="5"
                placeholder="Write your experience..."
                required>
        </textarea>

        <button type="submit"
                style="margin-top:20px;">
            Submit Review
        </button>

    </form>

    <p id="message"
       style="
       text-align:center;
       margin-top:20px;
       font-weight:bold;">
    </p>

</div>

<script>

    document.getElementById("reviewForm")
    .addEventListener("submit", function(e){

        e.preventDefault();

        const review = {

            rating:
                parseInt(
                    document
                    .getElementById("rating")
                    .value
                ),

            comment:
                document
                .getElementById("comment")
                .value,

            customer: {
                customerId:
                    parseInt(
                        document
                        .getElementById("customerId")
                        .value
                    )
            }

        };

        fetch(
            "http://localhost:8080/reviews/add",
            {
                method: "POST",

                headers: {
                    "Content-Type":
                        "application/json"
                },

                body:
                    JSON.stringify(review)
            }
        )

        .then(response => {

            if(!response.ok){
                throw new Error(
                    "Review failed"
                );
            }

            return response.json();

        })

        .then(data => {

            document
            .getElementById("message")
            .style.color = "#10b981";

            document
            .getElementById("message")
            .innerHTML =
                "⭐ Review Submitted Successfully!";

            document
            .getElementById("reviewForm")
            .reset();

        })

        .catch(error => {

            document
            .getElementById("message")
            .style.color = "#ef4444";

            document
            .getElementById("message")
            .innerHTML =
                "Failed to submit review.";

            console.log(error);

        });

    });

</script>

</body>
</html>
