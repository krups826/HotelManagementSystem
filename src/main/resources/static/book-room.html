<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserve Your Room | Grand Heaven</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav>
    <a href="index.html" style="text-decoration: none;"><h1>GRAND HEAVEN</h1></a>
    <div class="nav-links">
        <a href="rooms.html">Back to Rooms</a>
        <a href="dashboard.html">Dashboard</a>
    </div>
</nav>

<div class="container">
    <h2 style="text-align: center; font-family: 'Outfit', sans-serif; margin-bottom: 2rem;">Room Reservation</h2>
    
    <div style="background: rgba(255, 255, 255, 0.05); padding: 1rem; border-radius: 12px; margin-bottom: 2rem; display: flex; align-items: center; gap: 1rem; border: 1px solid var(--border-card);">
        <div style="font-size: 2rem;">🛏️</div>
        <div>
            <div style="font-weight: 600;">Selected Room</div>
            <div style="font-size: 0.85rem; color: var(--text-muted);">Deluxe AC Suite (101)</div>
        </div>
    </div>

    <form action="payment.html">
        <label>Check-In Date</label>
        <input type="date" required>

        <label>Check-Out Date</label>
        <input type="date" required>

        <div style="margin-bottom: 1.5rem; padding: 1rem; background: rgba(14, 165, 233, 0.05); border-radius: 12px; border: 1px dashed var(--primary);">
            <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                <span style="color: var(--text-muted);">Rate per night</span>
                <span>₹2,500</span>
            </div>
            <div style="display: flex; justify-content: space-between; font-weight: 700;">
                <span>Total Estimate</span>
                <span style="color: var(--primary);">₹2,500*</span>
            </div>
        </div>

        <button type="submit">Proceed to Payment</button>
    </form>
</div>

</body>
</html>
