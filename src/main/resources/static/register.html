<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Us | Grand Heaven</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav>
    <a href="index.html" style="text-decoration: none;"><h1>GRAND HEAVEN</h1></a>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="login.html">Login</a>
    </div>
</nav>

<div class="container" style="max-width: 500px;">
    <h2 style="text-align: center; font-family: 'Outfit', sans-serif; margin-bottom: 2rem;">Create Account</h2>

    <form id="registerForm">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="John Doe" required>

        <label>Email Address</label>
        <input type="email" id="email" placeholder="john@example.com" required>

        <label>Password</label>
        <input type="password" id="password" required>

        <label>Phone Number</label>
        <input type="text" id="phone" placeholder="+1 (555) 000-0000" required>

        <label>Residential Address</label>
        <input type="text" id="address" placeholder="123 Luxury Ave, Suite 456" required>

        <button type="submit" style="margin-top: 1rem;">Register Now</button>
    </form>

    <div id="message" style="text-align: center; margin-top: 1.5rem; font-weight: 500;"></div>

    <p style="text-align: center; margin-top: 2rem; color: var(--text-muted); font-size: 0.9rem;">
        Already have an account? <a href="login.html" style="color: var(--primary); text-decoration: none;">Sign in</a>
    </p>
</div>

<script>
    document.getElementById("registerForm").addEventListener("submit", function(e){
        e.preventDefault();

        const messageEl = document.getElementById("message");
        messageEl.style.color = "var(--text-main)";
        messageEl.innerText = "Processing...";

        const customer = {
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            password: document.getElementById("password").value,
            phone: document.getElementById("phone").value,
            address: document.getElementById("address").value
        };

        fetch("http://localhost:8080/customers/add", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(customer)
        })
        .then(response => {

            if (!response.ok) {
                throw new Error("Registration failed");
            }

            return response.text();

        })
        .then(data => {

            messageEl.style.color = "#10b981";
            messageEl.innerHTML =
                "Registration Successful! OTP sent to email.";

            document.getElementById(
                "registerForm").reset();

            setTimeout(() => {

                window.location.href =
                    "verify-otp.html";

            }, 2000);

        })
        .catch(error => {

            console.error(error);

            messageEl.style.color = "#ef4444";
            messageEl.innerHTML =
                "Registration Failed. Please try again.";

        });

    });
</script>
</body>
</html>
